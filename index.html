<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0c1838" />
<meta name="description" content="Le Constructeur d'Atomes — explore les 118 éléments, manipule le noyau en 3D et relève des défis. Un module Science Quest par Kotchami." />
<title>Le Constructeur d'Atomes — Chemistry Quest</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
  html,body{margin:0;padding:0;background:#070f24;}
  #root{min-height:100vh;}
  #splash{position:fixed;inset:0;display:grid;place-items:center;background:#070f24;
    color:#d8b15a;font-family:Georgia,serif;font-size:20px;z-index:9;transition:opacity .4s;}
  #splash.hide{opacity:0;pointer-events:none;}
</style>
</head>
<body>
<div id="splash">Le Constructeur d'Atomes…</div>
<div id="root"></div>
<script src="app.js"></script>
<script>
  // masque le splash une fois l'app montée
  requestAnimationFrame(() => {
    const s = document.getElementById('splash');
    if (s) setTimeout(() => s.classList.add('hide'), 300);
  });
</script>
</body>
</html>
