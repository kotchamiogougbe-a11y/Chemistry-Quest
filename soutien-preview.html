<style>
:root{--gold-bright:#F2D98D;--muted:#8FA0C0}
*{box-sizing:border-box}body{margin:0;background:#070f24;font-family:'Space Grotesk',sans-serif;
display:flex;justify-content:center;padding:22px 14px;min-height:100dvh}
.card{width:100%;max-width:560px}
.s{padding:20px;border-radius:16px;text-align:center;
background:linear-gradient(160deg,#1c2a5455,#0c193877);border:1px solid #E8C77822}
.t{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:23px;color:var(--gold-bright)}
.x{font-size:13.5px;line-height:1.55;color:#d7def0;font-weight:300;margin:8px auto 0;max-width:520px}
.p{font-size:12px;color:var(--muted);margin:14px 0 11px}
.row{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
.lb{display:flex;flex-direction:column;align-items:center;gap:7px;padding:11px 9px;border-radius:15px;
background:#ffffff0c;border:1px solid var(--mc);cursor:pointer;transition:all .15s;width:104px;font-family:inherit}
.lb:hover{transform:translateY(-1px)}
.lb.on{box-shadow:0 0 0 2px color-mix(in srgb,var(--mc) 40%,transparent)}
.lb img{width:56px;height:56px;border-radius:13px;object-fit:cover;background:#fff;box-shadow:0 1px 5px #00000044}
.lb span{font-size:12.5px;font-weight:600;color:#eef2fb}
.rev{min-height:38px;margin-top:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.num{font-family:'Space Mono',monospace;font-size:19px;font-weight:600;color:var(--gold-bright);letter-spacing:1.5px}
.cp{font-size:12px;color:#7ee0a0;font-weight:500}
.hint{font-size:12.5px;color:var(--muted);font-style:italic}
.th{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:#cdab63;margin-top:15px}
